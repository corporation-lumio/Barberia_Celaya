<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Seguimiento de tu cita — Nikos Barber</title>
<link rel="stylesheet" href="style.css">
<style>
  header {
    border-bottom: 1px solid var(--linea-suave);
    background: rgba(11,11,12,0.9);
    backdrop-filter: blur(8px);
  }
  .nav { display:flex; align-items:center; justify-content:space-between; padding: 20px 0; }
  .marca { display:flex; align-items:center; gap:12px; text-decoration:none; }
  .marca img { height: 38px; width: auto; }
  .marca span { font-size: 18px; font-style: italic; color: var(--marfil); }
  .volver { font-size: 13px; color: var(--tinta); text-decoration: none; }
  .volver:hover { color: var(--dorado-claro); }

  main { max-width: 560px; margin: 0 auto; padding: 70px 24px 90px; }
  h1 { font-weight: 300; font-size: 30px; margin-bottom: 10px; }
  main > p.sub { color: var(--tinta); margin-bottom: 40px; }

  .buscar-card {
    background: var(--negro-alt);
    border: 1px solid var(--linea);
    border-radius: var(--radio);
    padding: 28px 26px;
  }
  .fila-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }

  @media (max-width: 560px) {
    main { padding: 40px 16px 70px; }
    .fila-2 { grid-template-columns: 1fr; }
    .marca span { display: none; }
  }

  #resultado { margin-top: 34px; display: none; }

  .estado-linea {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 24px;
  }
  .estado-linea .badge { font-size: 12px; }

  .estrellas {
    display: flex;
    gap: 6px;
    margin: 16px 0 20px;
  }
  .estrella {
    font-size: 30px;
    cursor: pointer;
    color: var(--linea-suave);
    background: none;
    border: none;
    padding: 0;
    line-height: 1;
    transition: color .12s ease;
  }
  .estrella.activa, .estrella:hover, .estrella:hover ~ .estrella { color: var(--dorado-claro); }
  /* hover hacia atrás (de derecha a izquierda visualmente con flex-direction) */
  .estrellas { flex-direction: row-reverse; justify-content: flex-end; }

  .ya-calificado {
    text-align: center;
    padding: 20px 0;
    color: var(--tinta);
  }
  .ya-calificado .estrellas-fijas { color: var(--dorado-claro); font-size: 24px; margin-bottom: 10px; justify-content: center; display:flex; }

  .no-encontrado { color: var(--tinta); font-size: 14px; margin-top: 20px; display: none; }
</style>
</head>
<body>

<header>
  <div class="wrap nav">
    <a href="index.html" class="marca">
      <img src="logo.png" alt="" onerror="this.style.display='none'; document.getElementById('marca-fallback').style.display='flex';">
      <div class="pole" id="marca-fallback" style="display:none;"></div>
      <span class="display">Nikos Barber</span>
    </a>
    <a href="index.html" class="volver">&larr; Volver al sitio</a>
  </div>
</header>

<main>
  <h1>Seguimiento de tu cita</h1>
  <p class="sub">Escribe el número de tu ticket y el teléfono con el que agendaste para ver el estado de tu cita — y calificar el servicio una vez que hayas pasado.</p>

  <div class="buscar-card">
    <form id="form-buscar">
      <div class="fila-2">
        <div class="campo">
          <label for="numero">№ de ticket</label>
          <input type="text" id="numero" required placeholder="Ej. 118" inputmode="numeric">
        </div>
        <div class="campo">
          <label for="telefono">Teléfono</label>
          <input type="tel" id="telefono" required placeholder="4611234567">
        </div>
      </div>
      <button type="submit" class="btn btn-dorado" style="width:100%;">Buscar mi cita</button>
    </form>
    <p class="no-encontrado" id="no-encontrado">No encontramos ninguna cita con esos datos. Revisa el número de ticket y el teléfono.</p>
  </div>

  <div id="resultado">
    <div class="estado-linea">
      <span class="ticket-eyebrow">№ <span id="r-numero"></span></span>
      <span class="badge" id="r-badge"></span>
    </div>
    <p style="margin:0 0 4px;"><strong id="r-servicio"></strong></p>
    <p style="margin:0 0 4px; color:var(--tinta);" id="r-barbero"></p>
    <p style="margin:0 0 28px; color:var(--marfil);" id="r-fechahora"></p>

    <div id="zona-calificar"></div>
  </div>
</main>

<script type="module">
  import { DB, mostrarToast, formatearFecha } from './data.js';

  const resultado = document.getElementById('resultado');
  const noEncontrado = document.getElementById('no-encontrado');
  const zonaCalificar = document.getElementById('zona-calificar');
  let citaActual = null;

  document.getElementById('form-buscar').addEventListener('submit', async (e) => {
    e.preventDefault();
    const numero = document.getElementById('numero').value.trim();
    const telefono = document.getElementById('telefono').value.trim();
    const btn = e.target.querySelector('button[type="submit"]');
    btn.disabled = true;
    btn.textContent = 'Buscando…';

    const cita = await DB.buscarCita(numero, telefono);
    noEncontrado.style.display = 'none';
    resultado.style.display = 'none';
    btn.disabled = false;
    btn.textContent = 'Buscar mi cita';

    if (!cita) {
      noEncontrado.style.display = 'block';
      return;
    }

    citaActual = cita;
    await mostrarResultado(cita);
  });

  async function mostrarResultado(cita) {
    const servicio = await DB.servicio(cita.servicioId);
    const barbero = await DB.barbero(cita.barberoId);

    document.getElementById('r-numero').textContent = cita.numero;
    document.getElementById('r-badge').textContent = cita.estado;
    document.getElementById('r-badge').className = `badge badge-${cita.estado}`;
    document.getElementById('r-servicio').textContent = servicio ? `${servicio.nombre} — $${servicio.precio}` : '';
    document.getElementById('r-barbero').textContent = `Con ${barbero ? barbero.nombre : 'tu barbero'}`;
    document.getElementById('r-fechahora').textContent = `${formatearFecha(cita.fecha)} · ${cita.hora}`;

    zonaCalificar.innerHTML = '';

    if (cita.estado === 'completada' && !cita.calificacion) {
      renderFormularioCalificacion(cita);
    } else if (cita.calificacion) {
      zonaCalificar.innerHTML = `
        <div class="ya-calificado">
          <div class="estrellas-fijas">${'★'.repeat(cita.calificacion)}${'☆'.repeat(5 - cita.calificacion)}</div>
          <p>Gracias por calificar tu servicio.</p>
          ${cita.comentario ? `<p style="color:var(--marfil); font-style:italic;">"${escapeHtml(cita.comentario)}"</p>` : ''}
        </div>
      `;
    } else if (cita.estado === 'cancelada') {
      zonaCalificar.innerHTML = `<p style="color:var(--tinta);">Esta cita fue cancelada.</p>`;
    } else {
      zonaCalificar.innerHTML = `<p style="color:var(--tinta);">Podrás calificar el servicio en cuanto tu barbero marque la cita como completada.</p>`;
    }

    resultado.style.display = 'block';
  }

  function renderFormularioCalificacion(cita) {
    zonaCalificar.innerHTML = `
      <p class="ticket-eyebrow" style="margin-bottom: 4px;">¿Cómo estuvo tu servicio?</p>
      <div class="estrellas" id="estrellas"></div>
      <textarea id="comentario" rows="3" placeholder="Cuéntanos brevemente tu experiencia (opcional)"></textarea>
      <button class="btn btn-dorado" style="width:100%; margin-top:16px;" id="btn-enviar-calif" disabled>Enviar calificación</button>
    `;

    let seleccion = 0;
    const contEstrellas = document.getElementById('estrellas');
    for (let i = 5; i >= 1; i--) {
      const btn = document.createElement('button');
      btn.type = 'button';
      btn.className = 'estrella';
      btn.dataset.valor = i;
      btn.textContent = '★';
      contEstrellas.appendChild(btn);
    }

    function pintarEstrellas(valor) {
      document.querySelectorAll('.estrella').forEach(el => {
        el.classList.toggle('activa', parseInt(el.dataset.valor, 10) <= valor);
      });
    }

    contEstrellas.addEventListener('click', (e) => {
      const btn = e.target.closest('.estrella');
      if (!btn) return;
      seleccion = parseInt(btn.dataset.valor, 10);
      pintarEstrellas(seleccion);
      document.getElementById('btn-enviar-calif').disabled = false;
    });

    document.getElementById('btn-enviar-calif').addEventListener('click', async () => {
      if (seleccion === 0) return;
      const btnEnviar = document.getElementById('btn-enviar-calif');
      btnEnviar.disabled = true;
      const comentario = document.getElementById('comentario').value.trim();
      const actualizada = await DB.calificarCita(cita.numero, cita.telefono, seleccion, comentario);
      if (actualizada) {
        mostrarToast('¡Gracias por tu calificación!');
        mostrarResultado(actualizada);
      }
    });
  }

  function escapeHtml(str) {
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }
</script>

</body>
</html>
