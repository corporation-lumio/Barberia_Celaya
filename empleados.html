<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Empleados — Nikos Barber</title>
<link rel="stylesheet" href="style.css">
<style>
  header {
    border-bottom: 1px solid var(--linea-suave);
    background: var(--negro-alt);
  }
  .nav { display:flex; align-items:center; justify-content:space-between; padding: 18px 0; flex-wrap: wrap; gap: 14px; }
  .marca { display:flex; align-items:center; gap:12px; text-decoration:none; }
  .marca img { height: 38px; width: auto; }
  .marca span { font-size: 18px; font-style: italic; color: var(--marfil); }
  .nav-derecha { display:flex; align-items:center; gap:18px; flex-wrap: wrap; }
  .nav-derecha a.link-panel { font-size: 13px; color: var(--tinta); text-decoration:none; }
  .nav-derecha a.link-panel:hover { color: var(--dorado-claro); }
  .nav-derecha a.link-panel.activo { color: var(--dorado-claro); border-bottom: 1px solid var(--dorado-claro); padding-bottom: 2px; }

  main { padding: 44px 0 70px; }
  .encabezado { margin-bottom: 40px; }
  .encabezado h1 { font-weight: 300; font-size: 30px; margin-bottom: 8px; }
  .encabezado p { color: var(--tinta); }

  .layout { display: grid; grid-template-columns: 1fr 1.3fr; gap: 50px; align-items: start; }

  .form-card {
    background: var(--negro-alt);
    border: 1px solid var(--linea);
    border-radius: var(--radio);
    padding: 28px 26px;
    position: sticky;
    top: 24px;
  }
  .form-card h2 { font-weight: 400; font-size: 17px; margin-bottom: 4px; }
  .form-card .modo-nota { font-size: 12px; color: var(--tinta); margin-bottom: 20px; }
  .error-msg {
    display: none;
    background: rgba(154,59,59,0.1);
    border: 1px solid rgba(184,110,110,0.3);
    color: #c98c8c;
    padding: 10px 12px;
    border-radius: var(--radio);
    font-size: 13px;
    margin-bottom: 18px;
  }
  .form-acciones { display: flex; gap: 10px; }
  .form-acciones .btn { flex: 1; }

  .lista-empleados { display: flex; flex-direction: column; gap: 1px; background: var(--linea-suave); border: 1px solid var(--linea-suave); border-radius: var(--radio); overflow: hidden; }
  .empleado-item {
    background: var(--negro-alt);
    padding: 18px 22px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    flex-wrap: wrap;
  }
  .empleado-item.en-edicion { outline: 1px solid var(--dorado); outline-offset: -1px; }
  .empleado-info h3 { font-family: 'Fraunces', serif; font-weight: 400; font-size: 18px; margin-bottom: 4px; }
  .empleado-info p { color: var(--tinta); font-size: 13px; margin: 0; }
  .empleado-info .calif { color: var(--dorado-claro); font-size: 13px; margin-top: 4px; }
  .empleado-acciones { display: flex; gap: 8px; align-items: center; }

  .toggle {
    position: relative;
    width: 42px; height: 24px;
    border-radius: 100px;
    border: 1px solid var(--linea);
    background: transparent;
    cursor: pointer;
    flex-shrink: 0;
  }
  .toggle::after {
    content: "";
    position: absolute;
    top: 2px; left: 2px;
    width: 18px; height: 18px;
    border-radius: 50%;
    background: var(--tinta);
    transition: transform .18s ease, background .18s ease;
  }
  .toggle.activo { border-color: var(--dorado); }
  .toggle.activo::after { transform: translateX(18px); background: var(--dorado-claro); }

  .btn-mini {
    padding: 6px 10px;
    font-size: 12px;
    border-radius: var(--radio);
    border: 1px solid var(--linea);
    background: transparent;
    color: var(--marfil);
    cursor: pointer;
    font-family: 'Inter', sans-serif;
  }
  .btn-mini:hover { border-color: var(--dorado); color: var(--dorado-claro); }
  .btn-mini.eliminar:hover { border-color: #c98c8c; color: #e19a9a; }

  @media (max-width: 860px) {
    .layout { grid-template-columns: 1fr; }
    .form-card { position: static; }
  }

  @media (max-width: 640px) {
    .marca span { display: none; }
    .empleado-item { flex-direction: column; align-items: flex-start; gap: 12px; }
    .empleado-acciones { width: 100%; justify-content: flex-start; }
  }
</style>
</head>
<body>

<header>
  <div class="wrap nav">
    <a href="admin.html" class="marca">
      <img src="logo.png" alt="" onerror="this.style.display='none'; document.getElementById('marca-fallback').style.display='flex';">
      <div class="pole" id="marca-fallback" style="display:none;"></div>
      <span class="display">Nikos Barber</span>
    </a>
    <div class="nav-derecha">
      <a href="admin.html" class="link-panel">Panel</a>
      <a href="empleados.html" class="link-panel activo">Empleados</a>
      <a href="ajustes.html" class="link-panel">Ajustes</a>
    </div>
  </div>
</header>

<main class="wrap">
  <div class="encabezado">
    <h1>Empleados</h1>
    <p>Da de alta, edita o da de baja a los barberos que atienden en Nikos Barber. Solo el dueño puede entrar aquí.</p>
  </div>

  <div class="layout">
    <div class="form-card">
      <h2 id="form-titulo">Agregar barbero</h2>
      <p class="modo-nota" id="form-nota">Se le asigna acceso propio con usuario y contraseña.</p>
      <div class="error-msg" id="error-msg"></div>
      <form id="form-empleado">
        <input type="hidden" id="edit-id" value="">
        <div class="campo">
          <label for="nombre">Nombre</label>
          <input type="text" id="nombre" required placeholder="Ej. Chava">
        </div>
        <div class="campo">
          <label for="usuario">Usuario</label>
          <input type="text" id="usuario" required placeholder="Ej. chava">
        </div>
        <div class="campo">
          <label for="clave" id="label-clave">Contraseña</label>
          <input type="text" id="clave" placeholder="Contraseña temporal">
        </div>
        <div class="form-acciones">
          <button type="submit" class="btn btn-dorado" id="btn-guardar">Dar de alta</button>
          <button type="button" class="btn btn-fantasma" id="btn-cancelar" style="display:none;">Cancelar</button>
        </div>
      </form>
    </div>

    <div>
      <div class="lista-empleados" id="lista-empleados"></div>
    </div>
  </div>
</main>

<script type="module">
  import { DB, mostrarToast } from './data.js';

  if (!DB.haySesion() || DB.sesionActual().tipo !== 'dueno') {
    window.location.href = DB.haySesion() ? 'admin.html' : 'login.html';
  }

  const listaEmpleados = document.getElementById('lista-empleados');
  const form = document.getElementById('form-empleado');
  const editId = document.getElementById('edit-id');
  const formTitulo = document.getElementById('form-titulo');
  const formNota = document.getElementById('form-nota');
  const labelClave = document.getElementById('label-clave');
  const inputClave = document.getElementById('clave');
  const btnGuardar = document.getElementById('btn-guardar');
  const btnCancelar = document.getElementById('btn-cancelar');
  const errorMsg = document.getElementById('error-msg');

  function entrarModoEdicion(barbero) {
    editId.value = barbero.id;
    document.getElementById('nombre').value = barbero.nombre;
    document.getElementById('usuario').value = barbero.usuario;
    inputClave.value = '';
    inputClave.placeholder = 'Dejar en blanco para no cambiarla';
    labelClave.textContent = 'Nueva contraseña (opcional)';
    formTitulo.textContent = `Editando a ${barbero.nombre}`;
    formNota.textContent = 'Cambia lo que necesites y guarda.';
    btnGuardar.textContent = 'Guardar cambios';
    btnCancelar.style.display = 'inline-flex';
    errorMsg.style.display = 'none';
    renderLista();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  function salirModoEdicion() {
    editId.value = '';
    form.reset();
    inputClave.placeholder = 'Contraseña temporal';
    labelClave.textContent = 'Contraseña';
    formTitulo.textContent = 'Agregar barbero';
    formNota.textContent = 'Se le asigna acceso propio con usuario y contraseña.';
    btnGuardar.textContent = 'Dar de alta';
    btnCancelar.style.display = 'none';
    errorMsg.style.display = 'none';
    renderLista();
  }

  btnCancelar.addEventListener('click', salirModoEdicion);

  async function renderLista() {
    let barberos;
    try {
      barberos = await DB.obtenerBarberos();
    } catch (err) {
      console.error(err);
      listaEmpleados.innerHTML = `<div class="empleado-item"><p style="color:#e19a9a;">No se pudo conectar con la base de datos: ${err.message || err}</p></div>`;
      return;
    }
    listaEmpleados.innerHTML = '';

    if (barberos.length === 0) {
      listaEmpleados.innerHTML = '<div class="empleado-item"><p style="color:var(--tinta);">Todavía no das de alta a ningún barbero.</p></div>';
      return;
    }

    for (const b of barberos) {
      const prom = await DB.promedioCalificacion(b.id);
      const item = document.createElement('div');
      item.className = 'empleado-item' + (editId.value === b.id ? ' en-edicion' : '');
      item.innerHTML = `
        <div class="empleado-info">
          <h3>${b.nombre}</h3>
          <p>Usuario: <span class="mono">${b.usuario}</span></p>
          ${prom ? `<div class="calif">${prom.promedio} ★ (${prom.total} reseñas)</div>` : '<div class="calif" style="color:var(--tinta);">Sin reseñas todavía</div>'}
        </div>
        <div class="empleado-acciones">
          <button class="btn-mini" data-id="${b.id}" data-accion="editar">Editar</button>
          <button class="toggle ${b.activo ? 'activo' : ''}" data-id="${b.id}" data-accion="toggle" title="${b.activo ? 'Dar de baja' : 'Dar de alta'}"></button>
          <button class="btn-mini eliminar" data-id="${b.id}" data-accion="eliminar">Eliminar</button>
        </div>
      `;
      listaEmpleados.appendChild(item);
    }
  }

  listaEmpleados.addEventListener('click', async (e) => {
    const btn = e.target.closest('[data-accion]');
    if (!btn) return;
    const id = btn.dataset.id;
    const accion = btn.dataset.accion;

    try {
      const barberos = await DB.obtenerBarberos();
      const b = barberos.find(x => x.id === id);
      if (!b) return;

      if (accion === 'toggle') {
        await DB.cambiarEstadoBarbero(id, !b.activo);
        mostrarToast(b.activo ? `${b.nombre} dado de baja.` : `${b.nombre} dado de alta.`);
        renderLista();
      } else if (accion === 'editar') {
        entrarModoEdicion(b);
      } else if (accion === 'eliminar') {
        if (confirm(`¿Eliminar a ${b.nombre} permanentemente? Sus citas pasadas se conservan, pero ya no podrá iniciar sesión.`)) {
          await DB.eliminarBarbero(id);
          mostrarToast('Empleado eliminado.');
          if (editId.value === id) salirModoEdicion();
          renderLista();
        }
      }
    } catch (err) {
      console.error(err);
      mostrarToast(`Error: ${err.message || err}`);
    }
  });

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    errorMsg.style.display = 'none';

    const nombre = document.getElementById('nombre').value.trim();
    const usuario = document.getElementById('usuario').value.trim().toLowerCase();
    const clave = inputClave.value;
    const btnSubmit = form.querySelector('#btn-guardar');
    btnSubmit.disabled = true;

    try {
      if (editId.value) {
        if (!clave && !confirm('No escribiste una contraseña nueva, así que se conservará la actual. ¿Continuar?')) {
          btnSubmit.disabled = false;
          return;
        }
        const resultado = await DB.editarBarbero(editId.value, { nombre, usuario, clave });
        btnSubmit.disabled = false;
        if (resultado.error) {
          errorMsg.textContent = resultado.error;
          errorMsg.style.display = 'block';
          return;
        }
        mostrarToast(`${resultado.barbero.nombre} actualizado.`);
        salirModoEdicion();
      } else {
        if (!clave) {
          errorMsg.textContent = 'Escribe una contraseña para el nuevo empleado.';
          errorMsg.style.display = 'block';
          btnSubmit.disabled = false;
          return;
        }
        const resultado = await DB.agregarBarbero({ nombre, usuario, clave });
        btnSubmit.disabled = false;
        if (resultado.error) {
          errorMsg.textContent = resultado.error;
          errorMsg.style.display = 'block';
          return;
        }
        mostrarToast(`${resultado.barbero.nombre} dado de alta.`);
        form.reset();
        renderLista();
      }
    } catch (err) {
      console.error(err);
      btnSubmit.disabled = false;
      errorMsg.textContent = `Error de conexión con la base de datos: ${err.message || err}`;
      errorMsg.style.display = 'block';
    }
  });

  renderLista();
</script>

</body>
</html>
